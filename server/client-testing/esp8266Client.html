<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ESP8266</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h3>Connect to Webscoket</h3>
    <p id="connectionStatus">Not Connected</p>
    <input type="text" id="wsConnectText" placeholder="ID">
    <button id="wsConnectButton">Connect</button><br><br>
    <input type="text" id="wsMessageText" placeholder="Message">
    <button id="wsMessageButton">Send</button><br><br>
    <label id="wsMessage">Message:</label><br><br>


    <script>
      let socket;

      document.getElementById('wsConnectButton').addEventListener('click', () => {
        const clientId = document.getElementById('wsConnectText').value;
        const connectionStatus = document.getElementById('connectionStatus');
        const wsMessageLabel = document.getElementById('wsMessage');

        socket = new WebSocket(`ws://localhost:8080?id=${clientId}`);

        socket.onopen = () => {
          wsMessageLabel.textContent = 'Connected to WebSocket';
          connectionStatus.textContent = 'Connected';
        };

        socket.onmessage = (event) => {
          wsMessageLabel.textContent = `Message: ${event.data}`
          var message = JSON.parse(event.data);
          if('requester' in message) {
            if('light' in message) {
              socket.send(JSON.stringify({update: message.requester, light: message.light}));
            }
          }
        };

        socket.onerror = (error) => {
          wsMessageLabel.textContent = `Error: ${error.message}`;
        };

        socket.onclose = () => {
          wsMessageLabel.textContent = 'WebSocket connection closed';
          connectionStatus.textContent = 'Disconnected'
        };
      });

      document.getElementById('wsMessageButton').addEventListener('click', () => {
        const message = document.getElementById('wsMessageText').value;

        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(message);
        } else {
          document.getElementById('wsMessage').textContent = 'WebSocket is not connected';
        }
      });
    </script>
  </body>
</html>
